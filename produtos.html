<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produtos</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

button{
background:#00e676;
color:#000;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.lista{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:#141414;
border-radius:15px;
padding:15px;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:15px;
}

.card p{
margin-top:8px;
color:#ccc;
}

.acoes{
margin-top:15px;
display:flex;
gap:10px;
}

.acoes button{
flex:1;
}

</style>

</head>

<body>

<div class="topo">

<h2>Produtos</h2>

<button onclick="novoProduto()">
Novo Produto
</button>

</div>

<div class="lista" id="listaProdutos">

</div>

<script type="module" src="js/produtos.js"></script>

</body>
</html>
